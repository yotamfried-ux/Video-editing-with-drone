# SportReel tracking profile derived from the documented Ultralytics BoT-SORT
# configuration. Values remain conservative defaults until difficult surf footage
# provides tuning evidence. Re-identification is enabled because the product must
# preserve athlete identity through occlusion and among visually similar people.
tracker_type: botsort
track_high_thresh: 0.25
track_low_thresh: 0.10
new_track_thresh: 0.25
track_buffer: 30
match_thresh: 0.80
fuse_score: true

gmc_method: sparseOptFlow
proximity_thresh: 0.50
appearance_thresh: 0.80
with_reid: true
model: auto
