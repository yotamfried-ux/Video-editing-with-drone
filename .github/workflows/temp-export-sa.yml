# TEMPORARY — delete after running once
name: Set Vercel Drive Env Vars
on:
  workflow_dispatch:
    inputs:
      review_folder_id:
        description: 'REVIEW folder ID from Drive URL'
        required: true
      approved_folder_id:
        description: 'APPROVED folder ID from Drive URL'
        required: true
jobs:
  set-env:
    runs-on: ubuntu-latest
    steps:
      - name: Set GOOGLE_SERVICE_ACCOUNT_JSON
        run: |
          curl -sf -X POST https://api.vercel.com/v10/projects/prj_ucNsOHpdQBum3FHgED5ZPuGimrtq/env \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"key\":\"GOOGLE_SERVICE_ACCOUNT_JSON\",\"value\":$(echo "$SA_JSON" | jq -Rs .),\"type\":\"encrypted\",\"target\":[\"production\",\"preview\",\"development\"]}"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          SA_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      - name: Set REVIEW_FOLDER_ID
        run: |
          curl -sf -X POST https://api.vercel.com/v10/projects/prj_ucNsOHpdQBum3FHgED5ZPuGimrtq/env \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"key\":\"REVIEW_FOLDER_ID\",\"value\":\"${{ github.event.inputs.review_folder_id }}\",\"type\":\"plain\",\"target\":[\"production\",\"preview\",\"development\"]}"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: Set APPROVED_FOLDER_ID
        run: |
          curl -sf -X POST https://api.vercel.com/v10/projects/prj_ucNsOHpdQBum3FHgED5ZPuGimrtq/env \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"key\":\"APPROVED_FOLDER_ID\",\"value\":\"${{ github.event.inputs.approved_folder_id }}\",\"type\":\"plain\",\"target\":[\"production\",\"preview\",\"development\"]}"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: Done
        run: echo "All 3 env vars set in Vercel. Delete this workflow now."
