name: QA Check

on:
  pull_request:
    paths:
      - '.github/workflows/qa-check.yml'
      - 'pipeline/qa_gate_policy.py'
      - 'scripts/sitecustomize.py'
      - 'scripts/test_qa_gate_contract.py'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate QA contract
        run: python scripts/test_qa_gate_contract.py
