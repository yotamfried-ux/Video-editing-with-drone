name: Temp — Set GitHub Dispatch env vars in Vercel
on:
  workflow_dispatch:
jobs:
  set-env:
    runs-on: ubuntu-latest
    steps:
      - name: Set GITHUB_DISPATCH_TOKEN
        run: |
          curl -sf -X POST \
            "https://api.vercel.com/v10/projects/prj_ucNsOHpdQBum3FHgED5ZPuGimrTq/env?teamId=team_uUUpzY1J0BvqvtYwemoFoBdm&upsert=true" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"key":"GITHUB_DISPATCH_TOKEN","value":"${{ secrets.GITHUB_DISPATCH_TOKEN }}","type":"encrypted","target":["production","preview","development"]}'

      - name: Set GITHUB_REPO
        run: |
          curl -sf -X POST \
            "https://api.vercel.com/v10/projects/prj_ucNsOHpdQBum3FHgED5ZPuGimrTq/env?teamId=team_uUUpzY1J0BvqvtYwemoFoBdm&upsert=true" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"key":"GITHUB_REPO","value":"yotamfried-ux/Video-editing-with-drone","type":"plain","target":["production","preview","development"]}'
