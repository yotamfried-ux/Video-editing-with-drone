name: EAS Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
      profile:
        description: 'Build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  # Android builds run locally on the GH runner — no EAS queue wait (~15 min).
  build-android:
    name: Build Android (${{ inputs.profile }})
    if: inputs.platform == 'android'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        working-directory: mobile
        run: npm ci --legacy-peer-deps

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android locally
        working-directory: mobile
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
        run: eas build --platform android --profile ${{ inputs.profile }} --non-interactive --local --output /tmp/sportreel.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sportreel-android-${{ inputs.profile }}-${{ github.sha }}
          path: /tmp/sportreel.apk
          retention-days: 14

  # iOS must build remotely on EAS (needs macOS + Xcode). Submit and exit fast.
  build-ios:
    name: Build iOS (${{ inputs.profile }}) — remote EAS
    if: inputs.platform == 'ios'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm ci --legacy-peer-deps

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Submit iOS build to EAS (no-wait)
        working-directory: mobile
        run: eas build --platform ios --profile ${{ inputs.profile }} --non-interactive --no-wait
