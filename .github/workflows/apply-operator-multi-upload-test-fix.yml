name: Apply operator multi-upload contract fix

on:
  pull_request:
    paths:
      - '.github/workflows/apply-operator-multi-upload-test-fix.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: audit/end-to-end-hardening-20260721
          fetch-depth: 0
      - name: Replace stale embedded contract
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/operator-smoke-check.yml')
          text = path.read_text(encoding='utf-8')
          start_marker = '      - name: Validate Multi-upload batch contract\n'
          end_marker = '      - name: Validate cross-layer logical consistency\n'
          start = text.index(start_marker)
          end = text.index(end_marker, start)
          replacement = (
              '      - name: Validate Multi-upload batch contract\n'
              '        run: python scripts/test_multi_upload_batch_contract.py\n'
          )
          updated = text[:start] + replacement + text[end:]
          if updated == text:
              raise SystemExit('operator smoke workflow was not changed')
          path.write_text(updated, encoding='utf-8')
          PY
      - name: Commit exact patch
        run: |
          git config user.name 'sportreel-ci'
          git config user.email 'sportreel-ci@users.noreply.github.com'
          git add .github/workflows/operator-smoke-check.yml
          git diff --cached --check
          git commit -m 'Use one multi-upload contract source'
          git push origin HEAD:audit/end-to-end-hardening-20260721
