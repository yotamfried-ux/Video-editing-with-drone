name: BBox Crop Check

on:
  pull_request:
    paths:
      - '.github/workflows/bbox-crop-check.yml'
      - 'pipeline/perception/**'
      - 'pipeline/runtime_quality.py'
      - 'scripts/test_bbox_crop_contract.py'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install lightweight runtime config dependency
        run: python -m pip install python-dotenv
      - name: Validate BBox crop contract
        env:
          GEMINI_API_KEY: test
          GOOGLE_SERVICE_ACCOUNT_JSON: '{}'
          RAW_FOLDER_ID: test
          PROCESSED_FOLDER_ID: test
          REVIEW_FOLDER_ID: test
          APPROVED_FOLDER_ID: test
          OWNER_EMAIL: test@example.com
        run: python scripts/test_bbox_crop_contract.py
