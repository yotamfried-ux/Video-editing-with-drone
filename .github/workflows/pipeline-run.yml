name: Run Pipeline

# Triggered when new drone footage lands in the Drive/R2 RAW source.
#
#  • repository_dispatch (type: new-raw-video) — fired near-instantly by the
#    watcher/upload flow.
#  • workflow_dispatch — manual "Run workflow" button in the Actions tab.
#
# Required GitHub repository secrets (Settings → Secrets and variables → Actions):
#   GEMINI_API_KEY              Gemini API key
#   OWNER_EMAIL                 Operator email
#   GOOGLE_SERVICE_ACCOUNT_JSON Full service-account JSON (Drive backend only)
#   DRIVE_USER_TOKEN_JSON       Contents of drive_user_token.json (Drive backend only)
#   RAW_FOLDER_ID               Drive RAW folder ID (Drive backend only)
#   PROCESSED_FOLDER_ID         Drive PROCESSED folder ID (Drive backend only)
#   REVIEW_FOLDER_ID            Drive REVIEW folder ID (Drive backend only)
#   APPROVED_FOLDER_ID          Drive APPROVED folder ID (Drive backend only)
#   R2_ACCESS_KEY_ID            Cloudflare R2 access key (R2 backend only)
#   R2_SECRET_ACCESS_KEY        Cloudflare R2 secret key (R2 backend only)
#   R2_ACCOUNT_ID               Cloudflare account id (R2 backend only)
#   R2_BUCKET                   Cloudflare R2 bucket name (R2 backend only)
# Optional secrets:
#   NOTIFY_EMAIL, PREVIEW_FOLDER_ID, PENDING_PAYMENT_FOLDER_ID,
#   SUPABASE_URL, SUPABASE_SERVICE_KEY, SENTRY_DSN,
#   R2_ENDPOINT_URL, R2_PUBLIC_BASE_URL
# Optional repository variables:
#   STORAGE_BACKEND             drive or r2. Defaults to drive.
#   GEMINI_MODEL

on:
  repository_dispatch:
    types: [new-raw-video]
  workflow_dispatch:
    inputs:
      reset:
        description: 'Reset first (move PROCESSED→RAW, delete REVIEW drafts, clear state) so the same footage is reprocessed'
        type: boolean
        default: false
      full_clean:
        description: 'Full clean: also delete all generated outputs from APPROVED folder (use for a complete test reset)'
        type: boolean
        default: false
      pipeline_run_id:
        description: 'Optional pipeline_runs.id correlation id created by the operator app'
        required: false
        type: string
        default: ''

# Never run two pipeline jobs at once (they'd fight over the same RAW files).
concurrency:
  group: pipeline-run
  cancel-in-progress: false

jobs:
  run:
    name: Process new drone footage
    runs-on: ubuntu-latest
    timeout-minutes: 350   # GitHub hard cap is 360; leave headroom
    env:
      STORAGE_BACKEND: ${{ vars.STORAGE_BACKEND || 'drive' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ffmpeg + dlib build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg cmake build-essential

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # CPU-only torch keeps the install light (no CUDA wheels on the runner)
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Write credential files from secrets
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_USER_TOKEN_JSON: ${{ secrets.DRIVE_USER_TOKEN_JSON }}
        run: |
          if [ "$STORAGE_BACKEND" = "drive" ]; then
            printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > service_account.json
            printf '%s' "$DRIVE_USER_TOKEN_JSON" > drive_user_token.json
            # Sanity check that they are valid JSON (fails fast with a clear error)
            python -c "import json; json.load(open('service_account.json'))"
            python -c "import json; json.load(open('drive_user_token.json'))"
          else
            if [ -n "$GOOGLE_SERVICE_ACCOUNT_JSON" ]; then
              printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > service_account.json
            fi
            if [ -n "$DRIVE_USER_TOKEN_JSON" ]; then
              printf '%s' "$DRIVE_USER_TOKEN_JSON" > drive_user_token.json
            fi
            echo "Skipping required Drive credential validation for STORAGE_BACKEND=$STORAGE_BACKEND"
          fi

      - name: Preflight storage access
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
        run: python scripts/check_storage_access.py

      - name: Reset (optional — manual runs only)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.reset }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: service_account.json
          DRIVE_USER_TOKEN: drive_user_token.json
          RAW_FOLDER_ID: ${{ secrets.RAW_FOLDER_ID }}
          PROCESSED_FOLDER_ID: ${{ secrets.PROCESSED_FOLDER_ID }}
          REVIEW_FOLDER_ID: ${{ secrets.REVIEW_FOLDER_ID }}
          APPROVED_FOLDER_ID: ${{ secrets.APPROVED_FOLDER_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
          OWNER_EMAIL: ${{ secrets.OWNER_EMAIL }}
          TMP_DIR: /tmp/dtor
          PIPELINE_RUN_ID: ${{ github.event.client_payload.pipeline_run_id || inputs.pipeline_run_id || '' }}
          FULL_CLEAN: ${{ inputs.full_clean || 'false' }}
        run: |
          EXTRA_FLAGS=""
          if [ "$FULL_CLEAN" = "true" ]; then EXTRA_FLAGS="--full-clean"; fi
          python scripts/reset_and_rerun.py --reset-only $EXTRA_FLAGS

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-pro' }}
          GOOGLE_SERVICE_ACCOUNT_JSON: service_account.json
          DRIVE_USER_TOKEN: drive_user_token.json
          RAW_FOLDER_ID: ${{ secrets.RAW_FOLDER_ID }}
          PROCESSED_FOLDER_ID: ${{ secrets.PROCESSED_FOLDER_ID }}
          REVIEW_FOLDER_ID: ${{ secrets.REVIEW_FOLDER_ID }}
          APPROVED_FOLDER_ID: ${{ secrets.APPROVED_FOLDER_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
          PREVIEW_FOLDER_ID: ${{ secrets.PREVIEW_FOLDER_ID }}
          PENDING_PAYMENT_FOLDER_ID: ${{ secrets.PENDING_PAYMENT_FOLDER_ID }}
          OWNER_EMAIL: ${{ secrets.OWNER_EMAIL }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          TMP_DIR: /tmp/dtor
          PIPELINE_RUN_ID: ${{ github.event.client_payload.pipeline_run_id || inputs.pipeline_run_id || '' }}
        run: python scripts/run_tracked.py

      - name: Clean up credential files
        if: always()
        run: rm -f service_account.json drive_user_token.json
