name: Run Pipeline

on:
  repository_dispatch:
    types: [new-raw-video]
  workflow_dispatch:
    inputs:
      reset:
        description: 'Reset first (move PROCESSED→RAW, delete REVIEW drafts, clear state) so the same footage is reprocessed'
        type: boolean
        default: false
      full_clean:
        description: 'Full clean: also delete all generated outputs from APPROVED folder (use for a complete test reset)'
        type: boolean
        default: false
      pipeline_run_id:
        description: 'Optional pipeline_runs.id correlation id created by the operator app'
        required: false
        type: string
        default: ''
      batch_id:
        description: 'Optional RAW batch id; R2 runs process only raw/<batch_id>/ when set'
        required: false
        type: string
        default: ''

concurrency:
  group: pipeline-run
  cancel-in-progress: false

jobs:
  run:
    name: Process new drone footage
    runs-on: ubuntu-latest
    timeout-minutes: 350
    env:
      STORAGE_BACKEND: ${{ vars.STORAGE_BACKEND || secrets.STORAGE_BACKEND || 'drive' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ffmpeg + dlib build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg cmake build-essential

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          python - <<'PY'
          import torch
          import torchvision
          from torchvision.ops import nms
          print(f"torch={torch.__version__} torchvision={torchvision.__version__} nms={nms.__name__}")
          PY

      - name: Write credential files from secrets
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_USER_TOKEN_JSON: ${{ secrets.DRIVE_USER_TOKEN_JSON }}
        run: |
          if [ "$STORAGE_BACKEND" = "drive" ]; then
            printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > service_account.json
            printf '%s' "$DRIVE_USER_TOKEN_JSON" > drive_user_token.json
            python -c "import json; json.load(open('service_account.json'))"
            python -c "import json; json.load(open('drive_user_token.json'))"
          else
            if [ -n "$GOOGLE_SERVICE_ACCOUNT_JSON" ]; then
              printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > service_account.json
            fi
            if [ -n "$DRIVE_USER_TOKEN_JSON" ]; then
              printf '%s' "$DRIVE_USER_TOKEN_JSON" > drive_user_token.json
            fi
            echo "Skipping required Drive credential validation for STORAGE_BACKEND=$STORAGE_BACKEND"
          fi

      - name: Preflight storage access
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID || secrets.ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY || secrets.SECRET_KEY_ID }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET || 'sportreel' }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
          RAW_BATCH_ID: ${{ github.event.client_payload.batch_id || inputs.batch_id || '' }}
        run: python scripts/check_storage_access.py

      - name: Reset (optional — manual runs only)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.reset }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: service_account.json
          DRIVE_USER_TOKEN: drive_user_token.json
          RAW_FOLDER_ID: ${{ secrets.RAW_FOLDER_ID }}
          PROCESSED_FOLDER_ID: ${{ secrets.PROCESSED_FOLDER_ID }}
          REVIEW_FOLDER_ID: ${{ secrets.REVIEW_FOLDER_ID }}
          APPROVED_FOLDER_ID: ${{ secrets.APPROVED_FOLDER_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID || secrets.ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY || secrets.SECRET_KEY_ID }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET || 'sportreel' }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
          OWNER_EMAIL: ${{ secrets.OWNER_EMAIL }}
          TMP_DIR: /tmp/dtor
          PIPELINE_RUN_ID: ${{ github.event.client_payload.pipeline_run_id || inputs.pipeline_run_id || '' }}
          RAW_BATCH_ID: ${{ github.event.client_payload.batch_id || inputs.batch_id || '' }}
          FULL_CLEAN: ${{ inputs.full_clean || 'false' }}
        run: |
          EXTRA_FLAGS=""
          if [ "$FULL_CLEAN" = "true" ]; then EXTRA_FLAGS="--full-clean"; fi
          python scripts/reset_and_rerun.py --reset-only $EXTRA_FLAGS

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-pro' }}
          GOOGLE_SERVICE_ACCOUNT_JSON: service_account.json
          DRIVE_USER_TOKEN: drive_user_token.json
          RAW_FOLDER_ID: ${{ secrets.RAW_FOLDER_ID }}
          PROCESSED_FOLDER_ID: ${{ secrets.PROCESSED_FOLDER_ID }}
          REVIEW_FOLDER_ID: ${{ secrets.REVIEW_FOLDER_ID }}
          APPROVED_FOLDER_ID: ${{ secrets.APPROVED_FOLDER_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID || secrets.ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY || secrets.SECRET_KEY_ID }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET || 'sportreel' }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
          PREVIEW_FOLDER_ID: ${{ secrets.PREVIEW_FOLDER_ID }}
          PENDING_PAYMENT_FOLDER_ID: ${{ secrets.PENDING_PAYMENT_FOLDER_ID }}
          OWNER_EMAIL: ${{ secrets.OWNER_EMAIL }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SPORTREEL_PERCEPTION_COMMAND: ${{ secrets.SPORTREEL_PERCEPTION_COMMAND || vars.SPORTREEL_PERCEPTION_COMMAND || '' }}
          SPORTREEL_REQUIRE_PERCEPTION: ${{ secrets.SPORTREEL_REQUIRE_PERCEPTION || vars.SPORTREEL_REQUIRE_PERCEPTION || '' }}
          SPORTREEL_ULTRALYTICS_MODEL: ${{ secrets.SPORTREEL_ULTRALYTICS_MODEL || vars.SPORTREEL_ULTRALYTICS_MODEL || '' }}
          SPORTREEL_ULTRALYTICS_TRACKER: ${{ secrets.SPORTREEL_ULTRALYTICS_TRACKER || vars.SPORTREEL_ULTRALYTICS_TRACKER || '' }}
          SPORTREEL_ULTRALYTICS_FPS: ${{ secrets.SPORTREEL_ULTRALYTICS_FPS || vars.SPORTREEL_ULTRALYTICS_FPS || '' }}
          TMP_DIR: /tmp/dtor
          PIPELINE_RUN_ID: ${{ github.event.client_payload.pipeline_run_id || inputs.pipeline_run_id || '' }}
          RAW_BATCH_ID: ${{ github.event.client_payload.batch_id || inputs.batch_id || '' }}
        run: python scripts/run_tracked.py

      - name: Clean up credential files
        if: always()
        run: rm -f service_account.json drive_user_token.json
