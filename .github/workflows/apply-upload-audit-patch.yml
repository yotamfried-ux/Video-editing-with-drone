name: Apply Upload Audit Patch

on:
  push:
    branches: [feat/drone-large-upload-foundation]
    paths:
      - '.github/workflows/apply-upload-audit-patch.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-upload-audit-patch
  cancel-in-progress: false

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/drone-large-upload-foundation
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Apply deterministic audit reconciliation
        run: python scripts/apply_upload_foundation_audit_patch.py

      - name: Validate audit claims remain evidence-scoped
        run: |
          set -euo pipefail
          grep -q 'foundation implemented' docs/app-pipeline-audit.md
          grep -q 'live release evidence remains pending' docs/app-pipeline-audit.md
          grep -q 'GAP-013 — Resumable multipart R2 upload' docs/app-pipeline-audit.md
          grep -q 'GAP-014 — Durable Android source access and restart recovery' docs/app-pipeline-audit.md
          grep -q 'GAP-015 — Durable batch' docs/app-pipeline-audit.md
          if grep -q 'GAP-013.*Product gap closed' docs/app-pipeline-audit.md; then
            echo 'Audit overclaims GAP-013 closure.' >&2
            exit 1
          fi

      - name: Commit audit and remove one-shot machinery
        run: |
          set -euo pipefail
          rm scripts/apply_upload_foundation_audit_patch.py
          rm .github/workflows/apply-upload-audit-patch.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/app-pipeline-audit.md scripts/apply_upload_foundation_audit_patch.py .github/workflows/apply-upload-audit-patch.yml
          git diff --cached --check
          git commit -m 'docs: reconcile upload readiness audit with implemented foundation'
          git push origin HEAD:feat/drone-large-upload-foundation
