name: Narrative Check

on:
  pull_request:
    paths:
      - '.github/workflows/narrative-check.yml'
      - 'pipeline/narrative_policy.py'
      - 'scripts/sitecustomize.py'
      - 'scripts/test_narrative_policy_contract.py'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate narrative policy contract
        run: python scripts/test_narrative_policy_contract.py
