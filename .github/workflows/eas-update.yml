name: EAS Update

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '!mobile/android/**'
      - '!mobile/ios/**'

jobs:
  update:
    name: Push OTA update (preview channel)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm ci --legacy-peer-deps

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA update
        working-directory: mobile
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          # Use only the first line of the commit message — the full body
          # contains special chars (parens, quotes) that break eas update args.
          FIRST_LINE=$(printf '%s' "$COMMIT_MSG" | head -1)
          eas update \
            --channel preview \
            --message "$FIRST_LINE" \
            --non-interactive
