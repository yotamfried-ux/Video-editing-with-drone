name: EAS Update

# JS-only changes ship over the air in ~3 minutes — no new APK build.
# Native changes (new libraries, config plugins, app.json native fields)
# still require a full EAS Build.
on:
  push:
    branches: [main, 'claude/drone-pipeline-bootstrap-Yf0Hs']
    paths:
      - 'mobile/**'
      - '!mobile/android/**'
      - '!mobile/ios/**'
  workflow_dispatch:
    inputs:
      message:
        description: 'Update message (shown in expo.dev dashboard)'
        required: false
        default: 'JS update'
        type: string
      channel:
        description: 'Update channel (must match the installed build profile)'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  update:
    name: Push OTA update (preview channel)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm ci --legacy-peer-deps

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA update
        working-directory: mobile
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          INPUT_MSG: ${{ inputs.message }}
          INPUT_CHANNEL: ${{ inputs.channel }}
        run: |
          # Manual runs pass message/channel as inputs; push runs use the
          # commit message first line (full body contains special chars that
          # break eas update args).
          if [ -n "$INPUT_CHANNEL" ]; then
            CHANNEL="$INPUT_CHANNEL"
            MSG="$INPUT_MSG"
          else
            CHANNEL="preview"
            MSG=$(printf '%s' "$COMMIT_MSG" | head -1)
          fi
          eas update \
            --channel "$CHANNEL" \
            --message "$MSG" \
            --non-interactive
