name: Run Supabase Migration

on:
  workflow_dispatch:
    inputs:
      migration:
        description: "Migration filename under supabase/migrations"
        required: true
        type: string
        default: "20260624_add_pipeline_runs.sql"
      confirm_apply:
        description: "Type APPLY to run against the live database"
        required: true
        type: string
        default: "DRY_RUN"

  # Temporary same-repository operational PR trigger. This branch is never merged.
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths:
      - ".github/workflows/supabase-migrate.yml"

permissions:
  contents: read

concurrency:
  group: supabase-migration
  cancel-in-progress: false

jobs:
  migrate:
    name: Probe Supabase Management API
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      MIGRATION: 20260717_draft_publishability_authority.sql
      PROJECT_REF: bcndgmymnismbxvdeetc
      MODE: PROBE
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate selected migration
        run: |
          set -euo pipefail
          test -f "supabase/migrations/$MIGRATION"

      - name: Require Supabase Management API token
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "Missing GitHub secret SUPABASE_ACCESS_TOKEN." >&2
            exit 1
          fi
          echo "Supabase Management API token is configured."

      - name: Read-only database probe
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          project_ref = os.environ["PROJECT_REF"]
          token = os.environ["SUPABASE_ACCESS_TOKEN"]
          payload = {
              "query": "select to_regclass('public.draft_publishability')::text as table_name",
              "read_only": True,
          }
          request = urllib.request.Request(
              f"https://api.supabase.com/v1/projects/{project_ref}/database/query",
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json",
              },
              method="POST",
          )
          try:
              with urllib.request.urlopen(request, timeout=60) as response:
                  body = response.read().decode("utf-8")
                  print(f"Management API probe status: {response.status}")
                  print(body)
          except urllib.error.HTTPError as exc:
              body = exc.read().decode("utf-8", errors="replace")
              print(f"Management API probe failed with HTTP {exc.code}")
              print(body)
              raise SystemExit(1)
          PY
