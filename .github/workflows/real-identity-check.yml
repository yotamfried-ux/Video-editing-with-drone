name: Real Identity Check

on:
  pull_request:
    paths:
      - '.github/workflows/real-identity-check.yml'
      - 'pipeline/real_identity_gate.py'
      - 'scripts/sitecustomize.py'
      - 'scripts/test_real_identity_gate_contract.py'
      - 'docs/pipeline-quality-audit-real-run-20260705.md'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate real identity gate contract
        run: python scripts/test_real_identity_gate_contract.py
