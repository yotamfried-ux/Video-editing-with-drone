name: Deliver Preview

# Triggered immediately when the operator approves a reel from the app.
# Runs Phase 2a (deliver.py): downloads from Drive APPROVED, generates a
# 480p watermarked preview, emails the athlete, and moves to PENDING_PAYMENT.
#
# Required secrets (same Secrets page as pipeline-run):
#   GOOGLE_SERVICE_ACCOUNT_JSON  Full service-account JSON
#   DRIVE_USER_TOKEN_JSON        Operator OAuth token (needed for Drive moves)
#   APPROVED_FOLDER_ID           Drive APPROVED folder ID
#   PREVIEW_FOLDER_ID            Drive PREVIEW folder ID
#   PENDING_PAYMENT_FOLDER_ID    Drive PENDING_PAYMENT folder ID
#   OWNER_EMAIL                  Operator email
# Optional:
#   NOTIFY_EMAIL, SUPABASE_URL, SUPABASE_SERVICE_KEY, SENTRY_DSN

on:
  repository_dispatch:
    types: [reel-approved]
  workflow_dispatch: {}

concurrency:
  group: deliver-run
  cancel-in-progress: false

jobs:
  deliver:
    name: Deliver approved reel to athlete
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ffmpeg + dlib build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg cmake build-essential

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Write credential files from secrets
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_USER_TOKEN_JSON: ${{ secrets.DRIVE_USER_TOKEN_JSON }}
        run: |
          printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > service_account.json
          printf '%s' "$DRIVE_USER_TOKEN_JSON" > drive_user_token.json
          python -c "import json; json.load(open('service_account.json'))"
          python -c "import json; json.load(open('drive_user_token.json'))"

      - name: Run delivery (Phase 2a)
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: service_account.json
          DRIVE_USER_TOKEN: drive_user_token.json
          APPROVED_FOLDER_ID: ${{ secrets.APPROVED_FOLDER_ID }}
          PREVIEW_FOLDER_ID: ${{ secrets.PREVIEW_FOLDER_ID }}
          PENDING_PAYMENT_FOLDER_ID: ${{ secrets.PENDING_PAYMENT_FOLDER_ID }}
          OWNER_EMAIL: ${{ secrets.OWNER_EMAIL }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          TMP_DIR: /tmp/dtor
          DELIVERY_RUN_ID: ${{ github.event.client_payload.delivery_run_id || '' }}
          DELIVERY_APPROVED_FILE_ID: ${{ github.event.client_payload.approved_file_id || '' }}
          DELIVERY_APPROVED_FILE_NAME: ${{ github.event.client_payload.approved_file_name || '' }}
        run: python deliver.py

      - name: Clean up credential files
        if: always()
        run: rm -f service_account.json drive_user_token.json
