name: Deliver Preview

on:
  repository_dispatch:
    types: [reel-approved]
  workflow_dispatch: {}

concurrency:
  group: deliver-run
  cancel-in-progress: false

jobs:
  deliver:
    name: Deliver approved reel to athlete
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      STORAGE_BACKEND: ${{ vars.STORAGE_BACKEND || secrets.STORAGE_BACKEND || 'drive' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ffmpeg + dlib build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg cmake build-essential

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Write credential files from secrets
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_USER_TOKEN_JSON: ${{ secrets.DRIVE_USER_TOKEN_JSON }}
        run: |
          if [ "$STORAGE_BACKEND" = "drive" ]; then
            printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > service_account.json
            printf '%s' "$DRIVE_USER_TOKEN_JSON" > drive_user_token.json
            python -c "import json; json.load(open('service_account.json'))"
            python -c "import json; json.load(open('drive_user_token.json'))"
          else
            if [ -n "$GOOGLE_SERVICE_ACCOUNT_JSON" ]; then
              printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > service_account.json
            fi
            if [ -n "$DRIVE_USER_TOKEN_JSON" ]; then
              printf '%s' "$DRIVE_USER_TOKEN_JSON" > drive_user_token.json
            fi
            echo "Skipping required Drive credential validation for STORAGE_BACKEND=$STORAGE_BACKEND"
          fi

      - name: Run delivery (Phase 2a)
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: service_account.json
          DRIVE_USER_TOKEN: drive_user_token.json
          APPROVED_FOLDER_ID: ${{ secrets.APPROVED_FOLDER_ID }}
          PREVIEW_FOLDER_ID: ${{ secrets.PREVIEW_FOLDER_ID }}
          PENDING_PAYMENT_FOLDER_ID: ${{ secrets.PENDING_PAYMENT_FOLDER_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID || secrets.ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY || secrets.SECRET_KEY_ID }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET || 'sportreel' }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
          OWNER_EMAIL: ${{ secrets.OWNER_EMAIL }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          TMP_DIR: /tmp/dtor
          DELIVERY_RUN_ID: ${{ github.event.client_payload.delivery_run_id || '' }}
          DELIVERY_APPROVED_FILE_ID: ${{ github.event.client_payload.approved_file_id || '' }}
          DELIVERY_APPROVED_FILE_NAME: ${{ github.event.client_payload.approved_file_name || '' }}
        run: python deliver.py

      - name: Clean up credential files
        if: always()
        run: rm -f service_account.json drive_user_token.json
