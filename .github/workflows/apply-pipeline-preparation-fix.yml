name: Apply guarded upload preparation fix

on:
  push:
    branches:
      - audit/end-to-end-hardening-20260721
    paths:
      - '.github/workflows/apply-pipeline-preparation-fix.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: audit/end-to-end-hardening-20260721
          fetch-depth: 0
      - name: Guard SD and USB preparation failures
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('mobile/src/app/(operator)/pipeline.tsx')
          text = path.read_text(encoding='utf-8')
          old = '''  const uploadItemWithRetries = async (item: UploadFileState, batchId: string): Promise<void> => {
              const prepared = await prepareUpload(item);
              try {
                await withRetry(
                  async () => {
                    const session = await requestUploadSession(item, batchId);
                    await uploadPreparedFile(item, session, prepared.uri);
                  },
                  {
                    maxAttempts: MAX_UPLOAD_ATTEMPTS,
                    backoffMs: UPLOAD_RETRY_BACKOFF_CAPS_MS,
                    shouldRetry: isRetryableUploadError,
                    onAttempt: (attempt) => updateUploadItem(item.id, {
                      status: 'initializing',
                      progress: 0,
                      attempt,
                      error: attempt > 1 ? `Retrying automatically (${attempt}/${MAX_UPLOAD_ATTEMPTS})` : null,
                    }),
                  },
                );
              } catch (error) {
                updateUploadItem(item.id, {
                  status: 'failed',
                  error: error instanceof Error ? error.message : 'Upload failed',
                });
                throw error;
              } finally {
                await prepared.cleanup();
              }
            };'''
          new = '''  const uploadItemWithRetries = async (item: UploadFileState, batchId: string): Promise<void> => {
              let prepared: PreparedUpload | null = null;
              try {
                // Copying a Storage Access Framework URI can fail before any HTTP
                // request. Keep that preparation inside the guarded lifecycle so
                // the item becomes retryable instead of remaining "initializing".
                prepared = await prepareUpload(item);
                await withRetry(
                  async () => {
                    const session = await requestUploadSession(item, batchId);
                    await uploadPreparedFile(item, session, prepared!.uri);
                  },
                  {
                    maxAttempts: MAX_UPLOAD_ATTEMPTS,
                    backoffMs: UPLOAD_RETRY_BACKOFF_CAPS_MS,
                    shouldRetry: isRetryableUploadError,
                    onAttempt: (attempt) => updateUploadItem(item.id, {
                      status: 'initializing',
                      progress: 0,
                      attempt,
                      error: attempt > 1 ? `Retrying automatically (${attempt}/${MAX_UPLOAD_ATTEMPTS})` : null,
                    }),
                  },
                );
              } catch (error) {
                updateUploadItem(item.id, {
                  status: 'failed',
                  error: error instanceof Error ? error.message : 'Upload failed',
                });
                throw error;
              } finally {
                if (prepared) await prepared.cleanup();
              }
            };'''
          if text.count(old) != 1:
              raise SystemExit(f'expected one upload lifecycle block, found {text.count(old)}')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
      - name: Commit exact patch
        run: |
          git config user.name 'sportreel-ci'
          git config user.email 'sportreel-ci@users.noreply.github.com'
          git add 'mobile/src/app/(operator)/pipeline.tsx'
          git diff --cached --check
          git commit -m 'Guard external upload preparation failures'
          git push origin HEAD:audit/end-to-end-hardening-20260721
