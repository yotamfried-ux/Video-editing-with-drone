name: Performance Reel Contract

on:
  pull_request:
    paths:
      - '.github/workflows/performance-reel-contract.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose-repair-transport:
    runs-on: ubuntu-latest
    env:
      REPAIR_BRANCH: temp/logical-consistency-repair-bundle
      EXPECTED_PATCH_SHA256: 7bcfc4e74db1f085271bb69a05e5aa97d43512d99c4361e0c4e24bc5d065255f
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
      - name: Reconstruct repair patch without applying it
        run: |
          set -euo pipefail
          git fetch origin "$REPAIR_BRANCH"
          : > /tmp/logical-repair.patch
          git ls-tree -r --name-only FETCH_HEAD \
            | grep '^scripts/\.logical-repair-patch-' \
            | sort \
            | tee /tmp/logical-repair-files.txt
          while IFS= read -r path; do
            git show "FETCH_HEAD:$path" >> /tmp/logical-repair.patch
          done < /tmp/logical-repair-files.txt
          wc -c /tmp/logical-repair.patch | tee /tmp/logical-repair-size.txt
          sha256sum /tmp/logical-repair.patch | tee /tmp/logical-repair-sha256.txt
      - name: Upload transport diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: logical-repair-transport-diagnostics
          path: |
            /tmp/logical-repair.patch
            /tmp/logical-repair-files.txt
            /tmp/logical-repair-size.txt
            /tmp/logical-repair-sha256.txt
          if-no-files-found: error
          retention-days: 1
      - name: Require exact patch checksum
        run: echo "$EXPECTED_PATCH_SHA256  /tmp/logical-repair.patch" | sha256sum --check --strict
