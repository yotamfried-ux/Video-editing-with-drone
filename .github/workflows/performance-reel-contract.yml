name: Performance Reel Contract

on:
  pull_request:
    paths:
      - '.github/workflows/performance-reel-contract.yml'
      - 'README.md'
      - 'docs/audit/personal-publishable-reel-completion-plan-20260717.md'
      - 'docs/audit/run-29516256449-performance-reel-repair-plan.md'
      - 'docs/audit/cross-layer-logical-consistency-test-basis-20260717.md'
      - 'pipeline/performance_reel_policy.py'
      - 'pipeline/publishable_reel_policy.py'
      - 'pipeline/silent_output_policy.py'
      - 'pipeline/silent_qa_policy.py'
      - 'pipeline/publishable_qa_evidence.py'
      - 'pipeline/publishable_runtime_integrity.py'
      - 'pipeline/complete_action_window_policy.py'
      - 'pipeline/primary_actor_policy.py'
      - 'pipeline/primary_actor_parent_identity.py'
      - 'pipeline/single_athlete_selection_policy.py'
      - 'pipeline/context_qa_gate.py'
      - 'pipeline/context_qa_long_video.py'
      - 'pipeline/analyzer_score_guard.py'
      - 'pipeline/runtime_quality.py'
      - 'pipeline/qa_gate_policy.py'
      - 'pipeline/final_duplicate_guard.py'
      - 'pipeline/orchestrator.py'
      - 'pipeline/stages/analyzer.py'
      - 'pipeline/stages/editor.py'
      - 'pipeline/stages/feedback.py'
      - 'pipeline/bootstrap.py'
      - 'mobile/src/features/operator/types/contracts.ts'
      - 'web-api/src/types/operator-contracts.ts'
      - 'supabase/migrations/20260717_draft_publishability_authority.sql'
      - 'scripts/test_qa_reedit_schema_preflight_contract.py'
      - 'scripts/test_pipeline_quality_contract.py'
      - 'scripts/test_candidate_ledger_contract.py'
      - 'scripts/test_athlete_coverage_report_contract.py'
      - 'scripts/check_qa_reedit_schema.py'
      - 'scripts/build_candidate_decision_ledger.py'
      - 'integrations/supabase_uploader.py'
      - 'integrations/ffmpeg.py'
      - 'integrations/drive.py'
      - 'pipeline/stages/selector_candidates.py'
      - 'pipeline/selector_candidate_runtime.py'
      - 'pipeline/chunk_timeline_runtime.py'
      - 'pipeline/subject_gate_policy.py'
      - 'pipeline/rendered_timeline.py'
      - 'sitecustomize.py'
      - 'integrations/run_status.py'
      - 'scripts/run_tracked.py'
      - 'scripts/run_pipeline_with_diagnostics.sh'
      - 'scripts/check_publishable_manifest_empty.py'
      - 'scripts/check_publishable_reel_manifest.py'
      - 'scripts/publishable_manifest_contract.py'
      - 'scripts/record_publishable_business_gate_status.py'
      - 'scripts/sitecustomize.py'
      - 'scripts/usercustomize.py'
      - 'scripts/build_athlete_coverage_report.py'
      - 'scripts/test_bootstrap_parity_contract.py'
      - 'scripts/test_cross_sport_publishable_eval_matrix.py'
      - 'scripts/test_performance_reel_policy_contract.py'
      - 'scripts/test_pipeline_logical_consistency_integration.py'
      - 'scripts/test_publishable_coverage_fail_closed_contract.py'
      - 'scripts/test_publishable_gate_status_contract.py'
      - 'scripts/test_publishable_identity_lineage_contract.py'
      - 'scripts/test_publishable_qa_evidence_contract.py'
      - 'scripts/test_publishable_reel_business_contract.py'
      - 'scripts/test_publishable_reel_concurrency_contract.py'
      - 'scripts/test_publishable_runtime_integrity_contract.py'
      - 'scripts/test_review_finding_hardening_contract.py'
      - 'scripts/test_silent_output_policy_contract.py'
      - 'scripts/test_single_athlete_selection_policy_contract.py'
      - 'web-api/src/app/api/operator/drafts/route.ts'
      - 'web-api/src/lib/draft-publishability.ts'
      - 'web-api/src/lib/operator-draft-approve.ts'
      - 'mobile/src/app/(operator)/review.tsx'
      - 'mobile/src/shared/components/Card.tsx'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate all-waves performance reel contract
        run: python scripts/test_performance_reel_policy_contract.py
      - name: Validate centered-athlete selection contract
        run: python scripts/test_single_athlete_selection_policy_contract.py
      - name: Validate silent output runtime contract
        run: python scripts/test_silent_output_policy_contract.py
      - name: Validate per-athlete publishable reel business contract
        run: python scripts/test_publishable_reel_business_contract.py
      - name: Validate publishable runtime integrity
        run: python scripts/test_publishable_runtime_integrity_contract.py
      - name: Validate final product review fixes
        run: python scripts/test_review_finding_hardening_contract.py
      - name: Validate explicit final QA evidence
        run: python scripts/test_publishable_qa_evidence_contract.py
      - name: Validate missing coverage fails closed
        run: python scripts/test_publishable_coverage_fail_closed_contract.py
      - name: Validate concurrent publishable manifest updates
        run: python scripts/test_publishable_reel_concurrency_contract.py
      - name: Validate canonical identity lineage
        run: python scripts/test_publishable_identity_lineage_contract.py
      - name: Validate cross-sport publishable eval matrix
        run: python scripts/test_cross_sport_publishable_eval_matrix.py
      - name: Validate business gate status propagation
        run: python scripts/test_publishable_gate_status_contract.py
      - name: Validate bootstrap parity
        run: python scripts/test_bootstrap_parity_contract.py
      - name: Validate athlete coverage lifecycle contract
        run: python scripts/test_athlete_coverage_report_contract.py
      - name: Validate candidate-ledger accountability contract
        run: PYTHONPATH=scripts:. python scripts/test_candidate_ledger_contract.py
      - name: Validate Supabase authority schema contract
        run: python scripts/test_qa_reedit_schema_preflight_contract.py
      - name: Validate full pipeline quality contract
        run: python scripts/test_pipeline_quality_contract.py
      - name: Validate cross-layer logical consistency
        run: python scripts/test_pipeline_logical_consistency_integration.py
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate web API TypeScript
        working-directory: web-api
        run: |
          npm ci
          npm run type-check
      - name: Validate mobile review TypeScript
        working-directory: mobile
        run: |
          npm ci
          npm run type-check
