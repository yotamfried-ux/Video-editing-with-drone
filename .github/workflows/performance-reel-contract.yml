name: Performance Reel Contract

on:
  pull_request:
    paths:
      - '.github/workflows/performance-reel-contract.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  stage-verified-repair:
    runs-on: ubuntu-latest
    env:
      REPAIR_BRANCH: temp/logical-consistency-repair-bundle
      TARGET_BRANCH: temp/logical-consistency-applied
      EXPECTED_PATCH_SHA256: 7bcfc4e74db1f085271bb69a05e5aa97d43512d99c4361e0c4e24bc5d065255f
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Reconstruct, normalize, and verify repair patch
        run: |
          set -euo pipefail
          git fetch origin "$REPAIR_BRANCH"
          : > /tmp/logical-repair.patch
          git ls-tree -r --name-only FETCH_HEAD \
            | grep '^scripts/\.logical-repair-patch-' \
            | sort > /tmp/logical-repair-files.txt
          while IFS= read -r path; do
            git show "FETCH_HEAD:$path" >> /tmp/logical-repair.patch
          done < /tmp/logical-repair-files.txt
          python - <<'PY'
          from pathlib import Path

          path = Path('/tmp/logical-repair.patch')
          text = path.read_text(encoding='utf-8')
          replacements = [
              (
                  '+    if getattr(response, "data", None)) == []:',
                  '+    if getattr(response, "data", None) == []:',
              ),
              (
                  '        }),\n               });',
                  '                 }),\n               });',
              ),
              (
                  '+                 mark_upload_result(',
                  '+                mark_upload_result(',
              ),
              (
                  '-        ["pipeline.performance_reel_policy", "pipeline.publishable_reel_policy", "pipeline.silent_output_policy"],\n+        ["from pipeline.", "except Exception"],\n     )',
                  '-        ["pipeline.performance_reel_policy", "pipeline.publishable_reel_policy", "pipeline.silent_output_policy"],\n-    )\n+        ["from pipeline.", "except Exception"],\n+    )',
              ),
              (
                  '-     try:',
                  '-    try:',
              ),
          ]
          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(
                      f'repair transport normalization expected one occurrence, got {count}: {old!r}'
                  )
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY
          echo "$EXPECTED_PATCH_SHA256  /tmp/logical-repair.patch" | sha256sum --check --strict
      - name: Apply repair and verify integrated contracts
        run: |
          set -euo pipefail
          git show 344d03d7dab6d4a078aaa70f3920fd348357e36b:.github/workflows/performance-reel-contract.yml \
            > .github/workflows/performance-reel-contract.yml
          patch --batch --forward -p1 < /tmp/logical-repair.patch
          git diff --check
          python scripts/test_pipeline_logical_consistency_integration.py
          python scripts/test_bootstrap_parity_contract.py
          python scripts/test_performance_reel_policy_contract.py
          python scripts/test_publishable_reel_business_contract.py
      - name: Commit non-workflow repair files to staging branch
        run: |
          set -euo pipefail
          git checkout HEAD -- \
            .github/workflows/operator-smoke-check.yml \
            .github/workflows/performance-reel-contract.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Fix cross-layer logical consistency contracts'
          git push origin "HEAD:$TARGET_BRANCH"
