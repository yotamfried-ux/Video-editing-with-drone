name: Stripe Official Payment Contract

on:
  pull_request:
    paths:
      - '.github/workflows/stripe-official-payment-contract.yml'
      - 'docs/audit/stripe-mobile-payment-official-reference-audit-20260721.md'
      - 'scripts/test_stripe_official_payment_contract.py'
      - 'scripts/test_external_payment_store_gate_contract.py'
      - 'scripts/test_stripe_self_review_hardening_contract.py'
      - 'mobile/app.json'
      - 'mobile/eas.json'
      - 'mobile/package.json'
      - 'mobile/package-lock.json'
      - 'mobile/src/app/_layout.tsx'
      - 'mobile/src/app/checkout/**'
      - 'mobile/src/app/success/**'
      - 'mobile/src/app/(operator)/pricing.tsx'
      - 'mobile/src/features/payment/**'
      - 'web-api/package.json'
      - 'web-api/package-lock.json'
      - 'web-api/src/app/api/checkout/**'
      - 'web-api/src/app/api/download/**'
      - 'web-api/src/app/api/payment-status/**'
      - 'web-api/src/app/api/pricing/**'
      - 'web-api/src/app/api/webhooks/stripe/**'
      - 'web-api/src/lib/pricing.ts'
      - 'web-api/src/lib/stripe.ts'
      - 'web-api/src/types/database.ts'
      - 'supabase/migrations/20260612_create_core_schema.sql'
      - 'supabase/migrations/20260721_harden_payment_download_tokens.sql'
  workflow_dispatch:

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate official Stripe integration contract
        run: python scripts/test_stripe_official_payment_contract.py

      - name: Validate external payment store gate
        run: python scripts/test_external_payment_store_gate_contract.py

      - name: Validate fallback self-review hardening
        run: python scripts/test_stripe_self_review_hardening_contract.py

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            mobile/package-lock.json
            web-api/package-lock.json

      - name: Type-check Web API
        working-directory: web-api
        run: |
          npm ci
          npm run type-check

      - name: Type-check mobile app
        working-directory: mobile
        run: |
          npm ci
          npm run type-check
