name: Diagnose multi-upload contract

on:
  push:
    branches:
      - audit/end-to-end-hardening-20260721
    paths:
      - '.github/workflows/diagnose-multi-upload-contract.yml'

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: audit/end-to-end-hardening-20260721
          fetch-depth: 0
      - name: Capture exact contract result
        run: |
          set +e
          python scripts/test_multi_upload_batch_contract.py > /tmp/multi-upload-contract.log 2>&1
          status=$?
          {
            echo "exit_code=$status"
            cat /tmp/multi-upload-contract.log
          } > docs/audit/tmp-multi-upload-contract-diagnostic.txt
      - name: Commit diagnostic
        run: |
          git config user.name 'sportreel-ci'
          git config user.email 'sportreel-ci@users.noreply.github.com'
          git add docs/audit/tmp-multi-upload-contract-diagnostic.txt
          git commit -m 'Capture multi-upload contract diagnostic'
          git push origin HEAD:audit/end-to-end-hardening-20260721
