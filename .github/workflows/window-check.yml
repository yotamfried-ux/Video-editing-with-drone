name: Window Check

on:
  pull_request:
    paths:
      - '.github/workflows/window-check.yml'
      - 'pipeline/window_policy.py'
      - 'scripts/sitecustomize.py'
      - 'scripts/test_event_window_contract.py'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate window contract
        run: python scripts/test_event_window_contract.py
