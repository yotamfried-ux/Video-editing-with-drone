name: Large Upload Foundation Check

on:
  pull_request:
    paths:
      - '.github/workflows/large-upload-foundation-check.yml'
      - '.github/workflows/upload-foundation-release.yml'
      - 'docs/app-pipeline-audit.md'
      - 'docs/audit/drone-large-upload-experiment-entry-plan-20260723.md'
      - 'mobile/modules/sportreel-source-reader/**'
      - 'mobile/src/app/(operator)/pipeline.tsx'
      - 'mobile/src/features/operator/lib/multipartUploadClient.ts'
      - 'mobile/src/features/operator/lib/multipartUploadLedger.ts'
      - 'mobile/src/features/operator/lib/uploadLocalCleanup.ts'
      - 'mobile/src/features/operator/types/contracts.ts'
      - 'scripts/test_batch_scope_contract.py'
      - 'scripts/test_exact_source_upload_dedup_contract.py'
      - 'scripts/test_large_upload_ci_hygiene_contract.py'
      - 'scripts/test_large_upload_foundation_contract.py'
      - 'scripts/test_upload_batch_verified_gate_contract.py'
      - 'scripts/test_upload_foundation_release_contract.py'
      - 'supabase/migrations/20260723_source_upload_multipart_foundation.sql'
      - 'supabase/migrations/20260723_single_put_size_evidence.sql'
      - 'supabase/migrations/20260723_source_upload_local_cleanup_evidence.sql'
      - 'supabase/migrations/20260723_upload_batch_verified_gate.sql'
      - 'supabase/migrations/20260723_upload_start_idempotency.sql'
      - 'web-api/src/app/api/operator/pipeline/start/route.ts'
      - 'web-api/src/app/api/operator/upload/route.ts'
      - 'web-api/src/app/api/operator/upload/batch/route.ts'
      - 'web-api/src/app/api/operator/upload/multipart/**'
      - 'web-api/src/lib/multipart-upload-manifest.ts'
      - 'web-api/src/lib/r2-storage.ts'
      - 'web-api/src/lib/ratelimit.ts'
      - 'web-api/src/lib/source-upload-manifest.ts'
      - 'web-api/src/lib/upload-batch-manifest.ts'
      - 'web-api/src/types/operator-contracts.ts'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Check final-head patch hygiene
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: git diff --check "$BASE_SHA"...HEAD

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate upload foundation contracts
        run: |
          python scripts/test_large_upload_ci_hygiene_contract.py
          python scripts/test_large_upload_foundation_contract.py
          python scripts/test_upload_batch_verified_gate_contract.py
          python scripts/test_upload_foundation_release_contract.py
          PYTHONPATH=scripts:. python scripts/test_exact_source_upload_dedup_contract.py
          PYTHONPATH=scripts:. python scripts/test_batch_scope_contract.py

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web-api/package-lock.json

      - name: Type-check Web API multipart endpoints
        working-directory: web-api
        run: |
          npm ci
          npm run type-check

      - name: Type-check mobile helpers and verify native module autolinking
        working-directory: mobile
        run: |
          npm ci
          npm run type-check
          npx expo-modules-autolinking resolve --platform android > /tmp/expo-modules-android.json
          grep -q 'SportReelSourceReaderModule' /tmp/expo-modules-android.json

  android-native-compile:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Generate the Android project with the local module
        working-directory: mobile
        env:
          CI: '1'
        run: |
          npm ci
          npx expo prebuild --platform android --clean --no-install

      - name: Compile Android Kotlin, including SportReelSourceReader
        working-directory: mobile/android
        run: |
          chmod +x gradlew
          ./gradlew :app:compileDebugKotlin --no-daemon --stacktrace
