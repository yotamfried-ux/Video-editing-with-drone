name: Operator Smoke Check

on:
  pull_request:
    paths:
      - '.github/workflows/operator-smoke.yml'
      - '.github/workflows/operator-smoke-check.yml'
      - '.github/workflows/pipeline-run.yml'
      - 'docs/app-pipeline-audit.md'
      - 'docs/operator-api-contracts.md'
      - 'docs/operator-pipeline-contract.md'
      - 'docs/qa-reedit-migration-smoke.md'
      - 'integrations/drive.py'
      - 'integrations/r2_storage.py'
      - 'integrations/run_status.py'
      - 'integrations/storage.py'
      - 'integrations/supabase_uploader.py'
      - 'pipeline/context_qa_gate.py'
      - 'pipeline/context_qa_long_video.py'
      - 'pipeline/cross_source_dedup.py'
      - 'pipeline/multi_person_clip_gate.py'
      - 'pipeline/perception/event_fingerprint.py'
      - 'pipeline/perception/**'
      - 'pipeline/qa_gate_policy.py'
      - 'pipeline/runtime_quality.py'
      - 'pipeline/source_window_dedup.py'
      - 'pipeline/teaser_policy_runtime.py'
      - 'pipeline/stages/analyzer.py'
      - 'pipeline/stages/identity.py'
      - 'requirements.txt'
      - 'scripts/check_qa_reedit_schema.py'
      - 'scripts/verify_qa_reedit_tasks.py'
      - 'scripts/operator_smoke.py'
      - 'scripts/reset_and_rerun.py'
      - 'scripts/run_pipeline_with_diagnostics.sh'
      - 'scripts/run_tracked.py'
      - 'scripts/append_pairwise_source_window_overlap_to_report.py'
      - 'scripts/append_qa_policy_trace_summary_to_report.py'
      - 'scripts/build_draft_decision_trace.py'
      - 'scripts/generate_run_quality_report.py'
      - 'scripts/test_cross_source_dedup_contract.py'
      - 'scripts/test_drive_upload_contract.py'
      - 'scripts/test_explicit_sidecar_validation_contract.py'
      - 'scripts/test_multi_person_clip_gate_contract.py'
      - 'scripts/test_multi_upload_batch_contract.py'
      - 'scripts/test_operator_review_gate_contract.py'
      - 'scripts/test_operator_smoke_contract.py'
      - 'scripts/test_operator_smoke_workflow_validator.py'
      - 'scripts/test_pairwise_source_window_overlap_contract.py'
      - 'scripts/test_perception_contract.py'
      - 'scripts/test_perception_producer_diagnostics_contract.py'
      - 'scripts/test_pipeline_quality_contract.py'
      - 'scripts/test_pipeline_status_stale_contract.py'
      - 'scripts/test_qa_policy_trace_contract.py'
      - 'scripts/test_qa_reedit_loop_contract.py'
      - 'scripts/test_qa_reedit_schema_preflight_contract.py'
      - 'scripts/test_qa_reedit_task_verifier_contract.py'
      - 'scripts/test_run_quality_report_contract.py'
      - 'scripts/test_source_window_dedup_contract.py'
      - 'scripts/test_storage_contract.py'
      - 'scripts/test_teaser_policy_contract.py'
      - 'scripts/test_ultralytics_tracker_contract.py'
      - 'scripts/validate_operator_smoke_workflow.py'
      - 'supabase/migrations/**'
      - 'web-api/src/app/api/operator/drafts/route.ts'
      - 'web-api/src/app/api/operator/reprocess/route.ts'
      - 'web-api/src/app/api/operator/pipeline/start/route.ts'
      - 'web-api/src/app/api/operator/pipeline/status/route.ts'
      - 'web-api/src/app/api/operator/upload/route.ts'
      - 'web-api/src/lib/draft-review-policy.ts'
      - 'mobile/src/app/(operator)/pipeline.tsx'
      - 'mobile/src/app/(operator)/review.tsx'
      - 'mobile/src/features/operator/hooks/usePipelineStatus.ts'
      - 'mobile/src/features/operator/types/contracts.ts'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install perception dependency
        run: python -m pip install 'supervision>=0.29.0,<0.30.0'
      - name: Detect Web API changes
        id: web-api-changes
        shell: bash
        run: |
          if git diff --name-only "origin/${{ github.base_ref }}...HEAD" | grep -q '^web-api/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        if: steps.web-api-changes.outputs.changed == 'true'
        with:
          node-version: '20'
      - name: Validate Web API type-check
        if: steps.web-api-changes.outputs.changed == 'true'
        working-directory: web-api
        run: |
          npm ci
          npm run type-check
      - name: Validate Operator Smoke workflow
        run: python scripts/validate_operator_smoke_workflow.py
      - name: Validate Operator Smoke workflow validator contract
        run: python scripts/test_operator_smoke_workflow_validator.py
      - name: Validate Multi-upload batch contract
        run: |
          python - <<'PY'
          from pathlib import Path

          upload_route = Path('web-api/src/app/api/operator/upload/route.ts').read_text(encoding='utf-8')
          pipeline_screen = Path('mobile/src/app/(operator)/pipeline.tsx').read_text(encoding='utf-8')

          required_upload = [
              'files?: UploadFileInput[]',
              'normalizeUploadFiles',
              'uploadFilename',
              'createR2UploadUrl(file.uploadFilename, batchId)',
              'createUploadSession(file.uploadFilename, rawFolder, file.mimeType)',
              'source_filename: file.filename',
              'storage_key: upload.key',
          ]
          missing_upload = [token for token in required_upload if token not in upload_route]
          if missing_upload:
              raise SystemExit(f'multi-upload route missing: {missing_upload}')
          forbidden_upload = [
              'createR2UploadUrl(file.filename, batchId)',
              'createUploadSession(file.filename, rawFolder, file.mimeType)',
          ]
          present_upload = [token for token in forbidden_upload if token in upload_route]
          if present_upload:
              raise SystemExit(f'multi-upload route uses unsafe storage names: {present_upload}')

          required_mobile = [
              'allowsMultipleSelection: true',
              'UPLOAD_CONCURRENCY_LIMIT',
              'workerCount',
              'while (nextIndex < items.length)',
              'uploadAssetToSession(item, session)',
              'Upload batch progress',
              'Retry',
          ]
          missing_mobile = [token for token in required_mobile if token not in pipeline_screen]
          if missing_mobile:
              raise SystemExit(f'mobile upload missing: {missing_mobile}')
          forbidden_mobile = [
              'allowsMultipleSelection: false',
              'const asset = result.assets[0]',
              'items.map(async (item, index)',
              'setUploadProgress',
              'uploadProgress !== null',
          ]
          present_mobile = [token for token in forbidden_mobile if token in pipeline_screen]
          if present_mobile:
              raise SystemExit(f'mobile upload has unsafe flow: {present_mobile}')
          print('Multi-upload batch contract checks passed')
          PY
      - name: Validate QA re-edit loop contract
        run: python scripts/test_qa_reedit_loop_contract.py
      - name: Validate QA re-edit schema preflight contract
        run: python scripts/test_qa_reedit_schema_preflight_contract.py
      - name: Validate QA re-edit task verifier contract
        run: python scripts/test_qa_reedit_task_verifier_contract.py
      - name: Validate Multi-person clip gate contract
        run: PYTHONPATH=scripts:. python scripts/test_multi_person_clip_gate_contract.py
      - name: Validate Operator Smoke contract
        run: python scripts/test_operator_smoke_contract.py
      - name: Validate Perception contract
        run: python scripts/test_perception_contract.py
      - name: Validate Explicit sidecar validation contract
        run: python scripts/test_explicit_sidecar_validation_contract.py
      - name: Validate Producer diagnostics contract
        run: python scripts/test_perception_producer_diagnostics_contract.py
      - name: Validate Ultralytics tracker contract
        run: python scripts/test_ultralytics_tracker_contract.py
      - name: Validate QA policy trace contract
        run: python scripts/test_qa_policy_trace_contract.py
      - name: Validate Source window dedup contract
        run: python scripts/test_source_window_dedup_contract.py
      - name: Validate Pairwise source-window overlap contract
        run: python scripts/test_pairwise_source_window_overlap_contract.py
      - name: Validate Teaser policy contract
        run: python scripts/test_teaser_policy_contract.py
      - name: Validate Run quality report contract
        run: python scripts/test_run_quality_report_contract.py
      - name: Validate Cross-source dedup contract
        run: python scripts/test_cross_source_dedup_contract.py
      - name: Validate Pipeline quality contract
        run: python scripts/test_pipeline_quality_contract.py
      - name: Validate Pipeline Status stale contract
        run: python scripts/test_pipeline_status_stale_contract.py
      - name: Validate Drive upload credential contract
        run: python scripts/test_drive_upload_contract.py
      - name: Validate Storage abstraction contract
        run: python scripts/test_storage_contract.py
