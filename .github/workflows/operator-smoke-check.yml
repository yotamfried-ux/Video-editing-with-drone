permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install perception dependency
        run: python -m pip install 'supervision>=0.29.0,<0.30.0'
      - name: Detect Web API changes
        id: web-api-changes
        shell: bash
        run: |
          if git diff --name-only "origin/${{ github.base_ref }}...HEAD" | grep -q '^web-api/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        if: steps.web-api-changes.outputs.changed == 'true'
        with:
          node-version: '20'
      - name: Validate Web API type-check
        if: steps.web-api-changes.outputs.changed == 'true'
        working-directory: web-api
        run: |
          npm ci
          npm run type-check
      - name: Validate Operator Smoke workflow
        run: python scripts/validate_operator_smoke_workflow.py
      - name: Validate Operator Smoke workflow validator contract
        run: python scripts/test_operator_smoke_workflow_validator.py
      - name: Validate Multi-upload batch contract
        run: python scripts/test_multi_upload_batch_contract.py
      - name: Validate cross-layer logical consistency
        run: python scripts/test_pipeline_logical_consistency_integration.py
      - name: Validate Bootstrap parity contract
        run: PYTHONPATH=scripts:. python scripts/test_bootstrap_parity_contract.py
      - name: Validate Batch scope contract
        run: PYTHONPATH=scripts:. python scripts/test_batch_scope_contract.py
      - name: Validate QA re-edit loop contract
        run: python scripts/test_qa_reedit_loop_contract.py
      - name: Validate QA re-edit reason fallback contract
        run: python scripts/test_qa_reedit_reason_fallback_contract.py
      - name: Validate QA re-edit schema preflight contract
        run: python scripts/test_qa_reedit_schema_preflight_contract.py
      - name: Validate QA re-edit task verifier contract
        run: python scripts/test_qa_reedit_task_verifier_contract.py
      - name: Validate QA re-edit window contract
        run: python scripts/test_qa_reedit_window_contract.py
      - name: Validate Long-video subject prefilter contract
        run: python scripts/test_long_video_subject_prefilter_contract.py
      - name: Validate Chunk identity and timeline contract
        run: python scripts/test_chunk_identity_timeline_contract.py
      - name: Validate Draft identity lineage contract
        run: python scripts/test_draft_identity_lineage_contract.py
      - name: Validate Primary athlete selection policy contract
