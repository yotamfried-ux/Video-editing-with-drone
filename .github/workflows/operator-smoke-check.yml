name: Operator Smoke Check

on:
  pull_request:
    paths:
      - '.github/workflows/operator-smoke.yml'
      - 'scripts/validate_operator_smoke_workflow.py'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate Operator Smoke workflow
        run: python scripts/validate_operator_smoke_workflow.py
