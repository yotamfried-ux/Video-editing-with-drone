name: Set Resend Env Vars
on:
  workflow_dispatch:
jobs:
  set-env:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      TEAM_ID: team_uUUpzY1J0BvqvtYwemoFoBdm
      PROJECT_ID: prj_ucNsOHpdQBum3FHgED5ZPuGimrTq
    steps:
      - name: Set RESEND_API_KEY
        run: |
          RESPONSE=$(curl -s -X POST "https://api.vercel.com/v10/projects/$PROJECT_ID/env?teamId=$TEAM_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"key":"RESEND_API_KEY","value":"${{ secrets.RESEND_API_KEY }}","type":"encrypted","target":["production","preview","development"]}' \
            -w "\nHTTP_CODE:%{http_code}")
          HTTP_CODE=$(echo "$RESPONSE" | grep 'HTTP_CODE:' | cut -d: -f2)
          echo "HTTP: $HTTP_CODE"
          [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ] || (echo "$RESPONSE" | grep -v HTTP_CODE | head -c 300; exit 1)
      - name: Set RESEND_FROM_EMAIL
        run: |
          curl -sf -X POST "https://api.vercel.com/v10/projects/$PROJECT_ID/env?teamId=$TEAM_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"key":"RESEND_FROM_EMAIL","value":"onboarding@resend.dev","type":"plain","target":["production","preview","development"]}'
