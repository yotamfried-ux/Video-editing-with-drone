name: Apply Resilient Upload Type Fix

on:
  pull_request:
    branches: [main]
    paths:
      - 'scripts/apply_resilient_upload_type_fix.py'
      - '.github/workflows/apply-resilient-upload-type-fix.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - name: Apply focused type fix
        run: python scripts/apply_resilient_upload_type_fix.py
      - name: Validate mobile TypeScript
        working-directory: mobile
        run: |
          npm ci --legacy-peer-deps
          npm run type-check
      - name: Commit focused type fix
        shell: bash
        run: |
          rm scripts/apply_resilient_upload_type_fix.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add 'mobile/src/app/(operator)/pipeline.tsx'
          git add -u scripts/apply_resilient_upload_type_fix.py
          git commit -m 'Fix resilient upload batch ID typing'
          git push origin "HEAD:${{ github.head_ref }}"
